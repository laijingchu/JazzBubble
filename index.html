<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaders Blob Mixer</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="loading-screen">
    <div class="loader-inner">
      <div class="loader-spinner"></div>
      <p>Loading piano samples…</p>
    </div>
  </div>

  <canvas id="shader-canvas"></canvas>
  <canvas id="three-canvas"></canvas>
  <div id="code-modal" class="hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Exported Code</h2>
        <button id="close-modal">&times;</button>
      </div>
      <pre><code id="code-block"></code></pre>
      <button id="copy-btn">Copy to Clipboard</button>
    </div>
  </div>

  <div id="controls-tip">
    <button id="dismiss-tip" aria-label="Dismiss">&times;</button>
    <p class="tip-sound">🔊 Click anywhere to enable sound</p>
    <ul>
      <li><kbd data-key="1">1</kbd><kbd data-key="2">2</kbd><kbd data-key="3">3</kbd><kbd data-key="4">4</kbd> &mdash; row 4 notes</li>
      <li><kbd data-key="q">Q</kbd><kbd data-key="w">W</kbd><kbd data-key="e">E</kbd><kbd data-key="r">R</kbd> &mdash; row 3 notes</li>
      <li><kbd data-key="a">A</kbd><kbd data-key="s">S</kbd><kbd data-key="d">D</kbd><kbd data-key="f">F</kbd> &mdash; row 2 notes</li>
      <li><kbd data-key="z">Z</kbd><kbd data-key="x">X</kbd><kbd data-key="c">C</kbd><kbd data-key="v">V</kbd> &mdash; row 1 notes</li>
      <li><kbd data-key="ArrowUp">↑</kbd><kbd data-key="ArrowDown">↓</kbd><kbd data-key="ArrowLeft">←</kbd><kbd data-key="ArrowRight">→</kbd> &mdash; move (hold to repeat)</li>
      <li><kbd data-key="Space">Space</kbd> &mdash; bounce &amp; play current note</li>
      <li><span class="tip-mouse">Mouse click</span> &mdash; navigate to cell</li>
    </ul>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
